<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="succGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadowSucc" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#10B981" flood-opacity="0.2"/>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="110" fill="#ECFDF5"/>
  <circle cx="200" cy="150" r="85" fill="#D1FAE5" opacity="0.6"/>
  
  <!-- Main Checkmark Circle -->
  <g filter="url(#shadowSucc)">
    <circle cx="200" cy="150" r="55" fill="url(#succGrad)"/>
    <path d="M180 150 L195 165 L225 135" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Confetti / Sparks -->
  <g stroke="#F59E0B" stroke-width="4" stroke-linecap="round">
    <line x1="200" y1="55" x2="200" y2="40"/>
    <line x1="275" y1="85" x2="288" y2="72"/>
    <line x1="305" y1="150" x2="320" y2="150"/>
    <line x1="275" y1="215" x2="288" y2="228"/>
    <line x1="125" y1="85" x2="112" y2="72"/>
    <line x1="95" y1="150" x2="80" y2="150"/>
    <line x1="125" y1="215" x2="112" y2="228"/>
  </g>

  <!-- Floating Stars -->
  <path d="M260 60 L263 70 L273 73 L263 76 L260 86 L257 76 L247 73 L257 70 Z" fill="#FFC107"/>
  <path d="M140 230 L142 236 L148 238 L142 240 L140 246 L138 240 L132 238 L138 236 Z" fill="#0072CE"/>
  <circle cx="120" cy="110" r="6" fill="#10B981"/>
  <circle cx="290" cy="190" r="8" fill="#3B82F6"/>
</svg>
