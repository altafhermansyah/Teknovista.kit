<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003B73"/>
      <stop offset="100%" stop-color="#0072CE"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <filter id="boxShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="10" dy="16" stdDeviation="12" flood-color="#001a33" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="300" height="300" rx="16" fill="#F8FAFC"/>
  <circle cx="150" cy="150" r="110" fill="#EBF3FA"/>

  <!-- Items inside box poking out -->
  <g transform="translate(75, 50)">
    <!-- Book peeking -->
    <rect x="10" y="15" width="60" height="80" rx="4" fill="#002850" transform="rotate(-15)"/>
    <rect x="15" y="20" width="50" height="8" rx="2" fill="#FFD700" transform="rotate(-15)"/>
    <!-- Scroll peeking -->
    <rect x="80" y="10" width="45" height="90" rx="4" fill="#FEF3C7" stroke="#D97706" transform="rotate(12)"/>
    <!-- ID Card peeking -->
    <rect x="55" y="5" width="40" height="60" rx="4" fill="#FFFFFF" stroke="#0072CE" transform="rotate(5)"/>
  </g>

  <!-- Main Gift / Bundle Box -->
  <g transform="translate(55, 110)" filter="url(#boxShadow)">
    <rect x="0" y="30" width="190" height="120" rx="12" fill="url(#boxGrad)"/>
    <!-- Lid -->
    <rect x="-6" y="12" width="202" height="26" rx="8" fill="#002850"/>
    
    <!-- Gold Ribbon Vertical -->
    <rect x="80" y="12" width="30" height="138" fill="url(#ribbonGrad)"/>
    <!-- Gold Ribbon Horizontal -->
    <rect x="0" y="75" width="190" height="25" fill="url(#ribbonGrad)"/>
    
    <!-- Bow on top -->
    <path d="M95 12 C75 -10 45 -5 65 12 Z" fill="#FF9800"/>
    <path d="M95 12 C115 -10 145 -5 125 12 Z" fill="#FF9800"/>
    <circle cx="95" cy="12" r="10" fill="#FFC107"/>
  </g>

  <!-- Badge Hemat -->
  <g transform="translate(200, 30)">
    <circle cx="35" cy="35" r="28" fill="#EF4444"/>
    <text x="35" y="32" font-family="sans-serif" font-size="10" font-weight="900" fill="#FFFFFF" text-anchor="middle">HEMAT</text>
    <text x="35" y="44" font-family="sans-serif" font-size="11" font-weight="900" fill="#FFC107" text-anchor="middle">20%</text>
  </g>
</svg>
