<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <filter id="parchmentShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="8" dy="14" stdDeviation="10" flood-color="#001a33" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="300" height="300" rx="16" fill="#F8FAFC"/>
  <circle cx="150" cy="150" r="110" fill="#EBF3FA"/>

  <!-- Scroll / Certificate Document -->
  <g transform="translate(60, 40)" filter="url(#parchmentShadow)">
    <rect x="0" y="0" width="180" height="220" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
    
    <!-- Border frame inside -->
    <rect x="12" y="12" width="156" height="196" rx="4" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2"/>
    
    <!-- Gold Ribbon / Seal -->
    <circle cx="90" cy="40" r="18" fill="#D97706"/>
    <circle cx="90" cy="40" r="14" fill="#F59E0B"/>
    <path d="M82 54 L75 75 L90 68 L105 75 L98 54 Z" fill="#B45309"/>
    
    <text x="90" y="90" font-family="serif" font-size="13" font-weight="bold" fill="#78350F" text-anchor="middle">JANJI KSATRIA</text>
    <text x="90" y="105" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400E" text-anchor="middle">AIRLANGGA 2026</text>
    
    <!-- Text Lines -->
    <rect x="30" y="125" width="120" height="6" rx="3" fill="#78350F" opacity="0.7"/>
    <rect x="25" y="138" width="130" height="5" rx="2.5" fill="#92400E" opacity="0.5"/>
    <rect x="28" y="149" width="124" height="5" rx="2.5" fill="#92400E" opacity="0.5"/>
    <rect x="35" y="160" width="110" height="5" rx="2.5" fill="#92400E" opacity="0.5"/>
    <rect x="30" y="171" width="120" height="5" rx="2.5" fill="#92400E" opacity="0.5"/>
    
    <!-- Signature simulation -->
    <path d="M60 195 C70 190 80 200 90 192 C100 185 110 195 120 192" stroke="#003B73" stroke-width="2" fill="none"/>
  </g>
</svg>
