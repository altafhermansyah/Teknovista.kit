<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="idGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003B73"/>
      <stop offset="100%" stop-color="#0056A8"/>
    </linearGradient>
    <filter id="idShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="8" dy="12" stdDeviation="10" flood-color="#001a33" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="300" height="300" rx="16" fill="#F8FAFC"/>
  <circle cx="150" cy="150" r="110" fill="#EBF3FA"/>
  
  <g transform="translate(80, 20)">
    <!-- Lanyard Ribbon -->
    <path d="M50 0 L70 0 L80 65 L40 65 Z" fill="#003B73"/>
    <path d="M57 0 L63 0 L68 65 L52 65 Z" fill="#FFC107"/>
    <!-- Clip -->
    <rect x="45" y="60" width="30" height="18" rx="4" fill="#94A3B8"/>
    <circle cx="60" cy="78" r="8" fill="none" stroke="#64748B" stroke-width="3"/>
  </g>

  <!-- ID Card Body -->
  <g transform="translate(70, 85)" filter="url(#idShadow)">
    <rect x="0" y="0" width="160" height="195" rx="12" fill="#FFFFFF"/>
    <!-- Header -->
    <rect x="0" y="0" width="160" height="45" rx="12" fill="url(#idGrad)"/>
    <rect x="0" y="35" width="160" height="10" fill="url(#idGrad)"/>
    <text x="80" y="23" font-family="sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AMERTA UNAIR 2026</text>
    <text x="80" y="37" font-family="sans-serif" font-size="8" font-weight="600" fill="#FFC107" text-anchor="middle">OFFICIAL PARTICIPANT ID</text>
    
    <!-- Avatar photo circle -->
    <circle cx="80" cy="85" r="32" fill="#EBF3FA" stroke="#003B73" stroke-width="2"/>
    <circle cx="80" cy="76" r="12" fill="#0072CE"/>
    <path d="M56 110 C56 96 104 96 104 110 Z" fill="#0072CE"/>
    
    <!-- Name & Info lines -->
    <rect x="30" y="128" width="100" height="10" rx="5" fill="#1E293B"/>
    <rect x="45" y="145" width="70" height="8" rx="4" fill="#64748B"/>
    
    <!-- Barcode at bottom -->
    <g transform="translate(25, 163)" fill="#003B73">
      <rect x="0" y="0" width="4" height="18"/><rect x="7" y="0" width="2" height="18"/><rect x="12" y="0" width="6" height="18"/><rect x="21" y="0" width="3" height="18"/><rect x="27" y="0" width="5" height="18"/><rect x="35" y="0" width="2" height="18"/><rect x="40" y="0" width="7" height="18"/><rect x="50" y="0" width="4" height="18"/><rect x="57" y="0" width="2" height="18"/><rect x="62" y="0" width="6" height="18"/><rect x="71" y="0" width="4" height="18"/><rect x="78" y="0" width="5" height="18"/><rect x="86" y="0" width="3" height="18"/><rect x="92" y="0" width="6" height="18"/><rect x="101" y="0" width="4" height="18"/><rect x="107" y="0" width="3" height="18"/>
    </g>
  </g>
</svg>
