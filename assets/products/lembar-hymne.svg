<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <filter id="hymneShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="6" dy="12" stdDeviation="10" flood-color="#001a33" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="300" height="300" rx="16" fill="#F8FAFC"/>
  <circle cx="150" cy="150" r="110" fill="#EBF3FA"/>

  <!-- Sheet Music Paper -->
  <g transform="translate(65, 45)" filter="url(#hymneShadow)">
    <rect x="0" y="0" width="170" height="220" rx="6" fill="#FFFFFF"/>
    <!-- Decorative blue top accent -->
    <rect x="0" y="0" width="170" height="12" rx="6" fill="#003B73"/>
    <rect x="0" y="6" width="170" height="6" fill="#003B73"/>
    
    <text x="85" y="38" font-family="sans-serif" font-size="13" font-weight="900" fill="#003B73" text-anchor="middle">HYMNE AIRLANGGA</text>
    <text x="85" y="52" font-family="sans-serif" font-size="9" font-weight="600" fill="#64748B" text-anchor="middle">&amp; AIRLANGGA JIWAKU</text>
    
    <!-- Staff Lines & Notes -->
    <g transform="translate(20, 75)" stroke="#CBD5E1" stroke-width="1.5">
      <line x1="0" y1="0" x2="130" y2="0"/>
      <line x1="0" y1="8" x2="130" y2="8"/>
      <line x1="0" y1="16" x2="130" y2="16"/>
      <line x1="0" y1="24" x2="130" y2="24"/>
      <line x1="0" y1="32" x2="130" y2="32"/>
    </g>
    <!-- Music notes -->
    <g transform="translate(45, 80)" fill="#0072CE">
      <circle cx="0" cy="20" r="4.5"/>
      <line x1="4" y1="20" x2="4" y2="2" stroke="#0072CE" stroke-width="2"/>
      
      <circle cx="25" cy="15" r="4.5"/>
      <line x1="29" y1="15" x2="29" y2="-3" stroke="#0072CE" stroke-width="2"/>
      
      <circle cx="55" cy="24" r="4.5"/>
      <line x1="59" y1="24" x2="59" y2="6" stroke="#0072CE" stroke-width="2"/>
      
      <circle cx="80" cy="10" r="4.5"/>
      <line x1="84" y1="10" x2="84" y2="-8" stroke="#0072CE" stroke-width="2"/>
      <line x1="29" y1="-3" x2="84" y2="-8" stroke="#0072CE" stroke-width="3"/>
    </g>

    <g transform="translate(20, 130)" stroke="#CBD5E1" stroke-width="1.5">
      <line x1="0" y1="0" x2="130" y2="0"/>
      <line x1="0" y1="8" x2="130" y2="8"/>
      <line x1="0" y1="16" x2="130" y2="16"/>
      <line x1="0" y1="24" x2="130" y2="24"/>
      <line x1="0" y1="32" x2="130" y2="32"/>
    </g>
    <!-- More notes -->
    <g transform="translate(35, 135)" fill="#003B73">
      <circle cx="10" cy="15" r="4.5"/>
      <line x1="14" y1="15" x2="14" y2="-3" stroke="#003B73" stroke-width="2"/>
      <circle cx="45" cy="22" r="4.5"/>
      <line x1="49" y1="22" x2="49" y2="4" stroke="#003B73" stroke-width="2"/>
      <circle cx="85" cy="12" r="4.5"/>
      <line x1="89" y1="12" x2="89" y2="-6" stroke="#003B73" stroke-width="2"/>
    </g>
    
    <!-- Lyrics simulation lines -->
    <rect x="25" y="180" width="120" height="6" rx="3" fill="#94A3B8"/>
    <rect x="35" y="193" width="100" height="6" rx="3" fill="#94A3B8"/>
  </g>
</svg>
